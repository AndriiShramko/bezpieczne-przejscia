name: patrol

services:
  patrol-web:
    image: nginx:alpine
    container_name: patrol-web
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=patrol.flyreelstudio.eu
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=patrol.flyreelstudio.eu
      - LETSENCRYPT_EMAIL=zmei116@gmail.com
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [web-proxy, patrol-internal]
    depends_on: [patrol-form, patrol-cv]
    mem_limit: 128m
    memswap_limit: 128m
    cpus: 0.5
    pids_limit: 64
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  patrol-form:
    image: python:3.12-alpine
    container_name: patrol-form
    restart: unless-stopped
    command: ["python", "/app/server.py"]
    env_file: ./config.env
    environment: [PORT=8087]
    volumes:
      - ./server.py:/app/server.py:ro
    read_only: true
    tmpfs: [/tmp:size=8m]
    networks: [patrol-internal]
    mem_limit: 96m
    memswap_limit: 96m
    cpus: 0.25
    pids_limit: 32
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Real-time computer-vision worker: pulls a live crossing feed, runs YOLOX
  # on CPU, blurs faces/plates, counts + flags conflicts, serves MJPEG + API.
  patrol-cv:
    build: ./cv-service
    image: patrol-cv:latest
    container_name: patrol-cv
    restart: unless-stopped
    environment:
      - VIDEO_URL=https://ls-proxy-local.lantech.com.pl/hls/sch/index.m3u8
      - STREAM_REFERER=https://lantech.com.pl/
      - SOURCE_LABEL=Skrzyżowanie CH Słoneczne, Szczecin — publiczna kamera (LanTech LiveSzczecin)
      - PROC_WIDTH=1280
      - CONF=0.34
      - TARGET_FPS=2
      - CLIP_WIDTH=640
      - CLIP_FPS=2
      - MOVE_KMH_MIN=4
      - AI_DAILY_CAP=150
      - GEMINI_MODEL=gemini-3.1-flash-lite
      - CLIPS_MAX_GB=3.0
      - DISK_MIN_FREE_GB=2.5
    env_file: ./cv.env      # GEMINI_API_KEY, ADMIN_TOKEN, TG_BOT_TOKEN, TG_CHAT_ID — chmod 600, NOT in git
    volumes:
      - ./cv-data:/data
    networks: [patrol-internal]
    mem_limit: 1400m
    memswap_limit: 1400m
    cpus: 1.5
    pids_limit: 160
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  web-proxy:
    external: true
  patrol-internal:
