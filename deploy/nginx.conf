server {
    listen 80;
    server_name patrol.flyreelstudio.eu;

    root /usr/share/nginx/html;
    index index.html;

    # static dashboard — no video anywhere, aggregate charts only
    location / {
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;
    }

    # lead form -> internal proxy container (token never reaches the client)
    location /api/lead {
        proxy_pass http://patrol-form:8087/api/lead;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 32k;
    }
}
